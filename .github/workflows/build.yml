name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      # 1. Скачивание кода
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Настройка Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      
      # 3. Установка системных зависимостей
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libgl1-mesa-dev libgstreamer1.0-dev gstreamer1.0-plugins-base
          pip3 install --upgrade Cython==0.29.33 buildozer
      
      # 4. Кэширование
      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      
      # 5. Принятие лицензий Android SDK
      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
      
      # 6. Сборка APK
      - name: Build APK
        run: |
          buildozer android debug
      
      # 7. Upload artifact v4
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: glider-apk
          path: bin/*.apk
          retention-days: 30
          # В v4 нет параметра if-no-files-found по умолчанию, но можно добавить:
          if-no-files-found: warn
      
      # 8. Создание релиза (если это тег)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2 
        with:
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}